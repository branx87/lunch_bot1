services:
  postgres:
    image: postgres:15-alpine
    container_name: lunch_bot_postgres
    environment:
      POSTGRES_DB: lunch_bot
      POSTGRES_USER: bot_user
      POSTGRES_PASSWORD: lunch_bot123456
      TZ: Europe/Moscow
      PGTZ: Europe/Moscow
    ports:
      - "5434:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot_user -d lunch_bot"]
      interval: 30s
      timeout: 10s
      retries: 3

  lunch_bot:
    build:
      context: .
      args:
        USER_ID: 599
        GROUP_ID: 599
    container_name: lunch_bot
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data/configs:/app/data/configs:rw
      - ./data/logs:/app/data/logs:rw
      - ./data/reports:/app/data/reports:rw
      - ./data/db:/app/data/db:rw
      - ./data/backups:/app/data/backups:rw
      - .:/app:ro
    environment:
      - TZ=Europe/Moscow
      - PYTHONUNBUFFERED=1
      - PUID=599
      - PGID=599
    env_file:
      - ./data/configs/.env
    # network_mode: host
    restart: unless-stopped
    stop_grace_period: 30s
    user: "599:599"

  # Max bot — закомментирован, т.к. Max требует юрлицо для создания бота.
